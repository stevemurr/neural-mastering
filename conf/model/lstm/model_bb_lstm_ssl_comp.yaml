# SSL-style bus compressor emulator (fixed setting, peak-catcher mode).
#
# LSTM architecture (matches the LA-2A pipeline pattern). Hidden state carries
# unbounded effective receptive field across calls, so the C++ runtime can
# call it per 128-sample block without any ring-buffered windowing — same
# code path as LA-2A in the existing Compressor stage.
#
# hidden_size=32 mirrors LA-2A's working point. residual=true so the model
# learns the (often-small) gain reduction event as a delta on the dry signal,
# which suits a peak catcher at 1-3 dB GR where most of the signal passes
# through unchanged.

_target_: nablafx.BlackBoxSystem
lr: 0.005
use_callbacks: true
log_media_every_n_steps: 2000
model:
  _target_: nablafx.BlackBoxModel
  processor:
    _target_: nablafx.processors.lstm.LSTM
    num_inputs: 1
    num_outputs: 1
    num_controls: 0
    hidden_size: 32
    num_layers: 1
    residual: true
    direct_path: false
    cond_type: null
    cond_block_size: 128
    cond_num_layers: 1
loss:
  _target_: nablafx.evaluation.FlexibleLoss
  losses:
  - name: l1_loss
    weight: 0.33
    alias: l1
  - name: mrstft_loss
    weight: 0.67
    alias: mrstft
