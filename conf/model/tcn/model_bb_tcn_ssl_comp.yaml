# SSL-style bus compressor emulator (fixed setting, peak-catcher mode).
#
# Causal TCN with 10 dilation blocks (1, 2, 4, …, 512) at kernel_size=11.
# Receptive field = 1 + (11-1)*sum(dilations) = 10231 samples ≈ 232 ms at
# 44.1 kHz. Long enough for the full release ramp + the front edge of the
# program-dependent auto-release. (stack_size=10 == num_blocks ensures the
# dilation pattern doesn't reset mid-stack.)
#
# channel_width=32 gives enough per-layer capacity to learn the VCA's
# nonlinear color under fast modulation — at light GR (1-3 dB) this is most
# of what differentiates an SSL from any other peak catcher. ~60k params total.

_target_: nablafx.BlackBoxSystem
lr: 0.005
use_callbacks: true
log_media_every_n_steps: 2000
model:
  _target_: nablafx.BlackBoxModel
  processor:
    _target_: nablafx.processors.tcn.TCN
    num_inputs: 1
    num_outputs: 1
    num_controls: 0
    num_blocks: 10
    kernel_size: 11
    dilation_growth: 2
    channel_width: 32
    channel_growth: 1
    stack_size: 10
    groups: 1
    bias: true
    causal: true
    batchnorm: false
    residual: true
    direct_path: false
    cond_type: null
    cond_block_size: 128
    cond_num_layers: 1
    act_type: tanh
loss:
  _target_: nablafx.evaluation.FlexibleLoss
  losses:
  - name: l1_loss
    weight: 0.33
    alias: l1
  - name: mrstft_loss
    weight: 0.67
    alias: mrstft
